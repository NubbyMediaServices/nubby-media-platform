services:
  mysql:
    image: mysql:8.4
    container_name: scmsp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-secure_media_storage}
      MYSQL_USER: ${MYSQL_USER:-scmsp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-scmsp_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/secure_media_storage_final_patched.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scmsp-app
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-secure_media_storage}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-scmsp_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-scmsp_pass}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      APP_ALLOW_REGISTRATION: ${APP_ALLOW_REGISTRATION:-false}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8080}
      APP_STORAGE_ROOT: /var/lib/scmsp/storage
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app_storage:/var/lib/scmsp/storage

volumes:
  mysql_data:
  app_storage:
