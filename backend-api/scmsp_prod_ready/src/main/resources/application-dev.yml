server:
  port: 8080
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/secure_media_storage?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root1}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me-1234567890}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  security:
    allow-registration: ${APP_ALLOW_REGISTRATION:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  storage:
    root-location: ${APP_STORAGE_ROOT:./storage}

logging:
  level:
    root: INFO
    com.nubbymedia.scmsp: DEBUG
